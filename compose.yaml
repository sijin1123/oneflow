# OneFlow local development infrastructure.
#
# Docker Desktop + Compose is LOCAL DEVELOPMENT ONLY (../docs/ONEFLOW_POSTGRESQL_DEPLOYMENT_POLICY.md).
# Production PostgreSQL must be externalized (managed or dedicated server) and the app
# connects only through ONEFLOW_DATABASE_URL. A future compose.production.yaml will
# intentionally omit this postgres service (see infra/README.md).

services:
  postgres:
    image: postgres:17
    container_name: oneflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oneflow}
      POSTGRES_USER: ${POSTGRES_USER:-oneflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneflow}
      # C.UTF-8: platform-independent, reproducible initdb locale (PLAN §11).
      # Korean collation quality via ICU is a Phase 1 follow-up decision.
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
    ports:
      - "${ONEFLOW_POSTGRES_PORT:-5432}:5432"
    volumes:
      # Named volume only — never bind-mount DB data into the source tree (policy).
      - oneflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneflow} -d ${POSTGRES_DB:-oneflow}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  oneflow_postgres_data:
