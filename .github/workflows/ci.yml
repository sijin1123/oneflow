# OneFlow CI (PLAN §13). Job names backend/frontend/cleanroom are stable —
# they are registered as required status checks on main.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  # Weekly run so the advisory security-audit re-evaluates published advisories
  # against the pinned lockfiles even without a code change (Dependabot handles
  # remediation PRs — see .github/dependabot.yml).
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: oneflow
          POSTGRES_USER: oneflow
          POSTGRES_PASSWORD: oneflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U oneflow -d oneflow"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    env:
      ONEFLOW_ENV: test
      ONEFLOW_DATABASE_URL: postgresql+asyncpg://oneflow:oneflow@localhost:5432/oneflow
      ONEFLOW_TEST_DATABASE_URL: postgresql+asyncpg://oneflow:oneflow@localhost:5432/oneflow_test
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint (ruff)
        run: uv run ruff check . && uv run ruff format --check .
      - name: Migration smoke (up/down/up) with connect retry
        run: |
          for i in $(seq 1 10); do
            if uv run alembic upgrade head; then break; fi
            echo "DB not ready yet — retry $i"; sleep 2
          done
          uv run alembic downgrade base
          uv run alembic upgrade head
      - name: Tests (pytest, real PostgreSQL)
        run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit (node --test, pure functions)
        run: npm run test:unit
      - name: Component (vitest + Testing Library)
        run: npm run test:component
      - name: Build
        run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package-lock.json') }}
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: UI smoke (Playwright, mocked API)
        run: npm run test:e2e
        env:
          CI: "true"

  cleanroom:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - name: Install dependencies
        run: |
          (cd apps/web && npm ci)
          (cd apps/api && uv sync --frozen)
          (cd packages/shared && npm ci)
      - name: Clean-room gate
        run: bash scripts/check_cleanroom.sh
      - name: OpenAPI contract drift gate
        run: bash scripts/check-openapi-types.sh

  # Advisory dependency audit: surfaces known CVEs. Runs on PRs/pushes AND on the
  # weekly `schedule` above so pinned lockfiles are re-checked against newly
  # published advisories. Non-blocking — remediation PRs come from Dependabot
  # (.github/dependabot.yml). Not a required merge check.
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock
      - name: Backend audit (pip-audit)
        continue-on-error: true
        run: (cd apps/api && uv run --with pip-audit pip-audit)
      - name: Frontend audit (npm audit, high+)
        continue-on-error: true
        run: (cd apps/web && npm audit --audit-level=high)
