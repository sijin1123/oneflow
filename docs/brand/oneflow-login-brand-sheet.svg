<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title description">
  <title id="title">Oneflow login brand sheet</title>
  <desc id="description">Master ribbon mark, horizontal lockups, palette, spacing, and minimum-size guidance for the Oneflow login surface.</desc>
  <defs>
    <linearGradient id="mark-left" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#42C6F4"/><stop offset=".48" stop-color="#4C79F4"/><stop offset="1" stop-color="#6959F2"/>
    </linearGradient>
    <linearGradient id="mark-right" x1="1" y1="0" x2="0" y2="1">
      <stop stop-color="#36B9F1"/><stop offset=".48" stop-color="#5368F3"/><stop offset="1" stop-color="#7956EE"/>
    </linearGradient>
    <linearGradient id="button" x1="0" x2="1"><stop stop-color="#5367F5"/><stop offset="1" stop-color="#6558F4"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#31457E" flood-opacity=".12"/></filter>
    <g id="mark">
      <path d="M8.4 63.6a12 12 0 0 1-1-12.6L26.2 15.8a12.4 12.4 0 0 1 21.4-.8l20 31.6-14.4 24.6-16.4-27.2-10.4 19.6a10.4 10.4 0 0 1-18 .2Z" fill="url(#mark-left)"/>
      <path d="m45.4 63.8 30.2-52.2A11.2 11.2 0 0 1 95 22.8L69.2 69.2a13.4 13.4 0 0 1-23.8-5.4Z" fill="url(#mark-right)"/>
      <path d="m45.4 63.8 14.6-25.4 7.6 8.2-14.4 24.6a13.2 13.2 0 0 1-7.8-7.4Z" fill="#665CF1" opacity=".72"/>
    </g>
  </defs>
  <rect width="1200" height="720" rx="36" fill="#F7F9FD"/>
  <text x="68" y="78" fill="#101A33" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Oneflow login identity</text>
  <text x="68" y="110" fill="#64708A" font-family="Inter, Arial, sans-serif" font-size="16">Ribbon mark and calm workspace-authentication palette</text>
  <rect x="68" y="150" width="640" height="260" rx="22" fill="#FFF" filter="url(#shadow)"/>
  <g transform="translate(125 218)"><use href="#mark"/><text x="122" y="58" fill="#101A33" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="700">oneflow</text><text x="124" y="92" fill="#64708A" font-family="Inter, Arial, sans-serif" font-size="20">project management system</text></g>
  <g transform="translate(125 340) scale(.55)"><use href="#mark"/></g><text x="190" y="385" fill="#101A33" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">oneflow</text>
  <rect x="744" y="150" width="388" height="260" rx="22" fill="#FFF"/>
  <text x="782" y="196" fill="#101A33" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Core palette</text>
  <g font-family="Inter, Arial, sans-serif" font-size="13" fill="#64708A">
    <rect x="782" y="224" width="72" height="72" rx="14" fill="#101A33"/><text x="782" y="317">Ink</text>
    <rect x="870" y="224" width="72" height="72" rx="14" fill="#5367F5"/><text x="870" y="317">Flow blue</text>
    <rect x="958" y="224" width="72" height="72" rx="14" fill="#6858F5"/><text x="958" y="317">Violet</text>
    <rect x="1046" y="224" width="48" height="72" rx="14" fill="#42C6F4"/><text x="1046" y="317">Cyan</text>
  </g>
  <rect x="68" y="452" width="1064" height="200" rx="22" fill="#FFF"/>
  <text x="104" y="502" fill="#101A33" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Usage</text>
  <g transform="translate(105 532) scale(.42)"><use href="#mark"/></g>
  <line x1="105" y1="624" x2="205" y2="624" stroke="#DCE3F0" stroke-width="2"/><text x="225" y="600" fill="#101A33" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">Clear space</text><text x="225" y="626" fill="#64708A" font-family="Inter, Arial, sans-serif" font-size="14">Keep one half-mark width around every lockup.</text>
  <rect x="620" y="526" width="422" height="56" rx="10" fill="url(#button)"/><text x="831" y="561" text-anchor="middle" fill="#FFF" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="650">Sign in</text>
  <text x="620" y="618" fill="#64708A" font-family="Inter, Arial, sans-serif" font-size="14">Minimum digital mark: 28 px high · Lockup text always lowercase.</text>
</svg>
